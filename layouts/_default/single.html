{{ define "main" }}
<article style="padding: 8rem 2rem 4rem; max-width: 700px; margin: 0 auto;">
  <h1 style="font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 4vw, 3.5rem); margin-bottom: 2rem; font-weight: 400; letter-spacing: -0.02em;">
    {{ .Title }}
  </h1>
  <div style="font-size: 0.9rem; line-height: 1.8; color: #3a3a3a;">
    {{ .Content }}
  </div>
</article>
{{ end }}
