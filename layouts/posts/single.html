{{ define "main" }}
<article class="post">

  <header class="post-header">
    <div class="post-meta-top">
      <a href="{{ if eq .Language.Lang "en" }}/en/posts/{{ else }}/posts/{{ end }}" class="post-back">← {{ i18n "notes" }}</a>
      <span class="post-date">{{ .Date.Format "02.01.2006" }}</span>
    </div>
    <h1 class="post-title">{{ .Title }}</h1>
    <p class="post-description">{{ .Description }}</p>
    <div class="post-rule"></div>
  </header>

  <div class="post-body">
    {{ .Content }}
  </div>

  <footer class="post-footer">
    <div class="post-rule"></div>
    <div class="post-footer-inner">
      <a href="{{ if eq .Language.Lang "en" }}/en/posts/{{ else }}/posts/{{ end }}" class="post-back">← {{ i18n "all_notes" }}</a>
      {{ range .Translations }}
      <a href="{{ .RelPermalink }}" class="post-lang-switch">{{ i18n "read_translation" }}</a>
      {{ end }}
    </div>
  </footer>

</article>
{{ end }}
