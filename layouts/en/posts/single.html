{{ define "main" }}
<article class="post">

  <header class="post-header">
    <div class="post-meta-top">
      <a href="/en/posts/" class="post-back">← Notes</a>
      <span class="post-date">{{ .Date.Format "01.02.2006" }}</span>
    </div>
    <h1 class="post-title">{{ .Title }}</h1>
    <p class="post-description">{{ .Description }}</p>
    <div class="post-rule"></div>
  </header>

  <div class="post-body">
    {{ .Content }}
  </div>

  <footer class="post-footer">
    <div class="post-rule"></div>
    <div class="post-footer-inner">
      <a href="/en/posts/" class="post-back">← All notes</a>
      {{ with .Params.nl_url }}<a href="{{ . }}" class="post-lang-switch">Lees in het Nederlands →</a>{{ end }}
    </div>
  </footer>

</article>
{{ end }}
